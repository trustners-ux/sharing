server {
  listen 80;
  server_name www.trustner4u.com trustner4u.com;

  # MIS Application - served at /mis
  location /mis/ {
    alias /usr/share/nginx/html/;
    index index.html;
    try_files $uri $uri/ /mis/index.html;
  }

  # Redirect /mis to /mis/
  location = /mis {
    return 301 /mis/;
  }

  # API proxy - accessible at /api
  location /api {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for file uploads
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    client_max_body_size 10M;
  }

  # Root redirect to /mis/login
  location = / {
    return 301 /mis/login;
  }

  # Health check for monitoring
  location /health {
    proxy_pass http://backend:5000/health;
  }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
